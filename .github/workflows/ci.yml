name: ci

on:
  pull_request:
  push:
    branches: [main, '001-*']

jobs:
  guardrails:
    name: guardrails (gitignore + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert src/lib/ is NOT gitignored (Multibase regression)
        run: |
          # `git check-ignore` exits 0 if the path IS ignored, 1 if it ISN'T.
          # We want it to NOT be ignored — so we want exit 1.
          if git check-ignore -v apps/web/src/lib/api.ts; then
            echo "::error::apps/web/src/lib/api.ts is gitignored. The Multibase failure mode has returned. Remove 'lib/' from .gitignore."
            exit 1
          else
            echo "OK: src/lib/api.ts is not gitignored."
          fi

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck || true # warn-only until packages exist

  test:
    name: unit tests
    runs-on: ubuntu-latest
    needs: guardrails
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test

  # ─── Feature 021 — Dashboard browser-level e2e tests ───────────────────────
  #
  # Spins up postgres + redis via docker compose, runs the api + web as Node
  # processes (with SUPASTACK_TEST_FAKE_DOCKER=1 so per-instance provisioning
  # is mocked), then runs Playwright against the local dashboard. Captures
  # screenshots + traces on failure and uploads them as a build artifact.
  e2e:
    name: e2e browser tests
    runs-on: ubuntu-latest
    needs: guardrails
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @supastack/web exec playwright install --with-deps chromium

      - name: Generate test stack secrets
        id: secrets
        run: |
          MK=$(openssl rand -hex 32)
          DB_PW=$(openssl rand -hex 16)
          SS=$(openssl rand -hex 32)
          SVA=$(openssl rand -hex 32)
          SVB=$(openssl rand -hex 32)
          SVV=$(openssl rand -hex 16)
          cat > infra/.env <<EOF
          SUPASTACK_APEX=test.local
          SUPASTACK_PUBLIC_IP=
          SUPASTACK_VERSION=dev
          MASTER_KEY=${MK}
          CONTROL_DB_PASSWORD=${DB_PW}
          SESSION_SECRET=${SS}
          COOKIE_SECURE=0
          LOG_LEVEL=warn
          ACME_DIRECTORY_URL=
          STUDIO_IMAGE=supastack/studio:latest
          SUPAVISOR_API_JWT_SECRET=${SVA}
          SUPAVISOR_SECRET_KEY_BASE=${SVB}
          SUPAVISOR_VAULT_ENC_KEY=${SVV}
          EOF
          # Export for use by the api/web boot steps below
          echo "DATABASE_URL=postgres://supastack:${DB_PW}@localhost:5432/supastack" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "CONTROL_DB_PASSWORD=${DB_PW}" >> $GITHUB_ENV
          echo "MASTER_KEY=${MK}" >> $GITHUB_ENV
          echo "SESSION_SECRET=${SS}" >> $GITHUB_ENV

      - name: Start postgres + redis
        run: |
          cd infra
          sudo docker compose --env-file .env -f docker-compose.yml -f docker-compose.ci.yml up -d db redis
          # Wait for postgres to accept connections
          until sudo docker exec supastack-db-1 pg_isready -U supastack >/dev/null 2>&1; do
            echo "waiting for postgres..."; sleep 2
          done
          # Confirm host port bindings
          ss -tlnp 2>&1 | grep -E ':5432|:6379' || true

      - name: Run api in background
        env:
          SUPASTACK_TEST_FAKE_DOCKER: '1'
          NODE_ENV: development
          COOKIE_SECURE: '0'
          LOG_LEVEL: info
          PORT: '3001'
        run: |
          # `tsx watch` is for local dev; in CI we don't want filesystem
          # watching (it adds spurious restarts), and we want stdout flushed
          # immediately. Use plain `tsx` and unbuffered output.
          NODE_OPTIONS="--enable-source-maps" \
            pnpm --filter @supastack/api exec tsx src/server.ts \
              > /tmp/api.log 2>&1 &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          # Bounded wait for api health (120s). On every check, dump the
          # latest stderr/stdout so a hang's root cause is visible in the
          # job log without waiting for the deadline.
          deadline=$((SECONDS + 120))
          last_size=0
          while [ $SECONDS -lt $deadline ]; do
            if curl -fsS http://localhost:3001/api/v1/health >/dev/null 2>&1; then
              echo "api is healthy at t=$SECONDS"; break
            fi
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "::error::api process exited prematurely; full log:"
              cat /tmp/api.log
              exit 1
            fi
            # Stream new log content since last check
            cur_size=$(stat -c%s /tmp/api.log 2>/dev/null || echo 0)
            if [ "$cur_size" -gt "$last_size" ]; then
              tail -c +$((last_size + 1)) /tmp/api.log
              last_size=$cur_size
            fi
            sleep 2
          done
          if ! curl -fsS http://localhost:3001/api/v1/health >/dev/null 2>&1; then
            echo "::error::api did not become healthy in 120s; tail of log:"
            tail -200 /tmp/api.log
            exit 1
          fi

      - name: Run web dev server in background
        run: |
          pnpm --filter @supastack/web dev > /tmp/web.log 2>&1 &
          echo "WEB_PID=$!" >> $GITHUB_ENV
          until curl -fsS http://localhost:5173 >/dev/null 2>&1; do
            if ! kill -0 $! 2>/dev/null; then
              echo "::error::web process exited; tail of log:"
              tail -40 /tmp/web.log
              exit 1
            fi
            echo "waiting for web..."; sleep 2
          done

      - name: Run Playwright suite
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: '1'
        run: pnpm --filter @supastack/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            /tmp/api.log
            /tmp/web.log
          retention-days: 14

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body:
                `❌ **Browser-test job failed** — [view run](${runUrl})\n\n` +
                `Screenshots, traces, and api/web logs are attached as the ` +
                `\`playwright-report-${process.env.GITHUB_RUN_ID}\` artifact ` +
                `on that page. Download to reproduce the failure locally.\n\n` +
                `Run locally:\n` +
                '```bash\n' +
                'cd infra && sudo docker compose --env-file .env up -d db redis\n' +
                'SUPASTACK_TEST_FAKE_DOCKER=1 pnpm dev\n' +
                'pnpm --filter @supastack/web test:e2e\n' +
                '```'
            });
