<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#171717" />
    <title>Selfbase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        background: #171717;
        color: #fafafa;
        min-height: 100vh;
        /* Circular first (referenced; not shipped — Lineto-licensed),
           Inter as the loaded webfont fallback, then system stacks. */
        font-family:
          Circular,
          'Circular Std',
          'TT Commons Pro',
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Helvetica,
          sans-serif;
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      a {
        color: #3ecf8e;
        text-decoration: none;
      }
      *:focus-visible {
        outline: 2px solid #3ecf8e;
        outline-offset: 1px;
      }
      input:focus {
        border-color: #4d4d4d !important;
        background: rgba(255, 255, 255, 0.04) !important;
      }
      button:not(:disabled):hover {
        filter: brightness(1.1);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
