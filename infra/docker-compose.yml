# Selfbase control-plane stack.
#
# This is *not* a managed Supabase instance — it's the platform that manages
# them. It owns: control-plane Postgres, Redis (sessions + queue), Caddy
# (HTTPS + on-demand TLS), the Fastify API, the BullMQ worker, and the static
# React dashboard.

name: selfbase

networks:
  internal:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
  certs-data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: selfbase
      POSTGRES_PASSWORD: ${CONTROL_DB_PASSWORD:?CONTROL_DB_PASSWORD required}
      POSTGRES_DB: selfbase
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U selfbase -d selfbase']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis-data:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      timeout: 3s
      retries: 12

  caddy:
    # Custom Caddy build with caddy-l4 module (Postgres SNI routing on :5432).
    # See apps/caddy/Dockerfile for build context. First feature requiring a
    # custom Caddy build (feature 005); feature 004 wildcard cert stayed on stock.
    build:
      context: ..
      dockerfile: apps/caddy/Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - '80:80'
      - '443:443'
      # Port 5432 is owned by the api container's pg-edge-proxy (feature 005)
    volumes:
      - ../apps/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - certs-data:/var/selfbase/certs:ro
    networks: [internal]
    # Allow Caddy to reach per-instance Supabase containers which publish
    # their ports on the host (Kong 30000, Studio 30001, etc.). The
    # generated caddy-config.ts proxies to `host.docker.internal:<port>`;
    # on Linux that name isn't auto-populated, so we map it to the host
    # gateway explicitly. Without this every per-instance request 502s
    # with "dial tcp: lookup host.docker.internal: no such host".
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # admin :2019 is intentionally NOT published; only reachable from `internal` network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2019/config/']
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    image: selfbase/api:${SELFBASE_VERSION:-dev}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SELFBASE_SERVICE: api
      DATABASE_URL: postgres://selfbase:${CONTROL_DB_PASSWORD}@db:5432/selfbase
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      CADDY_ADMIN_URL: http://caddy:2019
      INSTANCES_DIR: /var/selfbase/instances
      BACKUPS_DIR: /var/selfbase/backups
      SELFBASE_PUBLIC_IP: ${SELFBASE_PUBLIC_IP:-}
      SELFBASE_CERTS_DIR: /var/selfbase/certs
      ACME_DIRECTORY_URL: ${ACME_DIRECTORY_URL:-}
      # COOKIE_SECURE=0 (default) lets the session cookie work over plain HTTP
      # — required for /setup + /login before an apex + HTTPS cert exist.
      # Flip to 1 once HTTPS is in place.
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      # Supavisor admin client (feature 005 Phase 5) — pooler-client mints
      # short-TTL HS256 JWTs with this secret to call supavisor's /api/tenants.
      SUPAVISOR_URL: http://supavisor:4000
      SUPAVISOR_API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:-}
    ports:
      - 3001:3001
      # pg-edge proxy — direct Postgres endpoint for db.<ref>.<apex>:5432
      # (feature 005). Runs inside the api Node.js process.
      - '5432:5432'
    volumes:
      - /var/selfbase/instances:/var/selfbase/instances
      - /var/selfbase/backups:/var/selfbase/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - certs-data:/var/selfbase/certs
    networks: [internal]
    # pg-edge proxy (feature 005) connects to per-instance Postgres via
    # host.docker.internal:<port_db_direct>. Same mapping as caddy uses
    # for per-instance Kong/Studio.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:3001/api/v1/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: selfbase/worker:${SELFBASE_VERSION:-dev}
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SELFBASE_SERVICE: worker
      DATABASE_URL: postgres://selfbase:${CONTROL_DB_PASSWORD}@db:5432/selfbase
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      CADDY_ADMIN_URL: http://caddy:2019
      INSTANCES_DIR: /var/selfbase/instances
      BACKUPS_DIR: /var/selfbase/backups
      STUDIO_IMAGE: ${STUDIO_IMAGE:-selfbase/studio:latest}
      # Feature 008 — worker pooler-reconciler needs to call supavisor admin API.
      SUPAVISOR_URL: http://supavisor:4000
      SUPAVISOR_API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:-}
    volumes:
      - /var/selfbase/instances:/var/selfbase/instances
      - /var/selfbase/backups:/var/selfbase/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - ../infra/supabase-template:/app/infra/supabase-template:ro
    networks: [internal]
    # Feature 008 — pg-password probe (provision worker + pooler-reconciler)
    # needs to reach per-instance Postgres via host.docker.internal:<port_db_direct>.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MCP HTTP service — wraps upstream @supabase/mcp-server-supabase as a
  # Streamable HTTP transport at mcp.<apex>/mcp, gated by selfbase OAuth
  # bearer tokens (feature 014).
  mcp:
    image: selfbase/mcp:${SELFBASE_VERSION:-dev}
    build:
      context: ..
      dockerfile: apps/mcp/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SELFBASE_SERVICE: mcp
      DATABASE_URL: postgres://selfbase:${CONTROL_DB_PASSWORD}@db:5432/selfbase
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      SELFBASE_API_URL: http://api:3001
      SELFBASE_APEX: ${SELFBASE_APEX:?SELFBASE_APEX required}
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:3002/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  # Top-level Supavisor — multi-tenant Postgres pooler (feature 005 Phase 5).
  # Provides pooler.<apex>:6543 (transaction mode). Each project is registered
  # as a tenant; clients connect with username postgres.<ref> per Supabase Cloud
  # convention. Tenants are managed by the selfbase api via supavisor's HTTP
  # admin API. See specs/005-postgres-public-endpoint/.
  supavisor:
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '6543:6543'
    volumes:
      - certs-data:/var/selfbase/certs:ro
    environment:
      PORT: 4000
      DATABASE_URL: ecto://selfbase:${CONTROL_DB_PASSWORD}@db:5432/selfbase
      CLUSTER_POSTGRES: 'true'
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE:?SUPAVISOR_SECRET_KEY_BASE required}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY:?SUPAVISOR_VAULT_ENC_KEY required}
      API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:?SUPAVISOR_API_JWT_SECRET required}
      METRICS_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      GLOBAL_DOWNSTREAM_CERT_PATH: /var/selfbase/certs/${SELFBASE_APEX:?SELFBASE_APEX required}/cert.pem
      GLOBAL_DOWNSTREAM_KEY_PATH: /var/selfbase/certs/${SELFBASE_APEX}/key.pem
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: selfbase/web:${SELFBASE_VERSION:-dev}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks: [internal]
    # web is fronted by Caddy; no public port published.
