# Supastack control-plane stack.
#
# This is *not* a managed Supabase instance — it's the platform that manages
# them. It owns: control-plane Postgres, Redis (sessions + queue), Caddy
# (HTTPS + on-demand TLS), the Fastify API, the BullMQ worker, and the static
# React dashboard.

name: supastack

networks:
  internal:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  caddy-data:
  caddy-config:
  certs-data:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: supastack
      POSTGRES_PASSWORD: ${CONTROL_DB_PASSWORD:?CONTROL_DB_PASSWORD required}
      POSTGRES_DB: supastack
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U supastack -d supastack']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis-data:/data
    networks: [internal]
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 5s
      timeout: 3s
      retries: 12

  auth:
    # Control-plane GoTrue (feature 084) — owns operator identity (auth.users).
    # Same image as the per-instance template. Reached at /auth/v1/* via Caddy
    # (strip_path_prefix). JWT secret is HKDF-derived from MASTER_KEY — see
    # scripts/derive-gotrue-secret.mjs (populates GOTRUE_JWT_SECRET in infra/.env).
    image: supabase/gotrue:v2.186.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      # Runs as the control-plane superuser; owns the `auth` schema (created
      # idempotently by migration 0017). sslmode=disable — internal network, no TLS on db.
      GOTRUE_DB_DATABASE_URL: 'postgres://supastack:${CONTROL_DB_PASSWORD}@db:5432/supastack?search_path=auth&sslmode=disable'
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_SITE_URL: 'https://${SUPASTACK_APEX}'
      # External URL where GoTrue is reachable (Caddy /auth/v1/* → auth:9999).
      # Required — and read WITHOUT the GOTRUE_ prefix (matches the per-instance template).
      API_EXTERNAL_URL: 'https://${SUPASTACK_APEX}/auth/v1'
      GOTRUE_JWT_ISSUER: 'https://${SUPASTACK_APEX}/auth/v1'
      # HKDF(MASTER_KEY,'supastack-gotrue-jwt-v1') — the api verifies with the same value.
      GOTRUE_JWT_SECRET: '${GOTRUE_JWT_SECRET:?GOTRUE_JWT_SECRET required - run scripts/derive-gotrue-secret.mjs}'
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: '3600'
      GOTRUE_JWT_ADMIN_ROLES: service_role
      # Invite-only — no open signup; first operator is created via the admin API in /setup.
      GOTRUE_DISABLE_SIGNUP: 'true'
      # Email/password on; phone + social + MFA off (out of scope for 084).
      GOTRUE_EXTERNAL_EMAIL_ENABLED: 'true'
      GOTRUE_EXTERNAL_PHONE_ENABLED: 'false'
      GOTRUE_MFA_ENABLED: 'false'
      # Feature 084 US6 — auto-confirm until SMTP is configured, then operators set
      # GOTRUE_MAILER_AUTOCONFIRM=false in infra/.env to require email confirmation.
      GOTRUE_MAILER_AUTOCONFIRM: ${GOTRUE_MAILER_AUTOCONFIRM:-true}
      # SMTP — operator-provided in infra/.env. When GOTRUE_SMTP_HOST is set,
      # GoTrue sends invite / recovery / confirmation emails.
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${GOTRUE_SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${GOTRUE_SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${GOTRUE_SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${GOTRUE_SMTP_ADMIN_EMAIL:-}
      GOTRUE_SMTP_SENDER_NAME: ${GOTRUE_SMTP_SENDER_NAME:-supastack}
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9999/health']
      interval: 10s
      timeout: 5s
      retries: 12

  caddy:
    # Stock Caddy. The former custom caddy-l4 build (feature 005, Postgres SNI on
    # :5432) was vestigial — the shipped 005 implementation moved SNI routing into
    # the api's pg-edge-proxy, and no layer4 config exists anywhere (boot Caddyfile,
    # runtime caddy-config.ts, or the live admin config all show http+tls only).
    # Boot config is the bind-mounted Caddyfile below; full runtime routes are
    # pushed by the api (caddy-config.ts → admin :2019 /load).
    image: caddy:2.11-alpine
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    environment:
      # Feature 014 — needed by the explicit mcp.<apex> server block in Caddyfile.
      SUPASTACK_APEX: ${SUPASTACK_APEX:?SUPASTACK_APEX required}
    ports:
      - '80:80'
      - '443:443'
      # Port 5432 is owned by the api container's pg-edge-proxy (feature 005)
    volumes:
      # Sibling file — the full install distributable is this dir: compose +
      # Caddyfile + generated .env (everything else is pulled images).
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - certs-data:/var/supastack/certs:ro
    networks: [internal]
    # Allow Caddy to reach per-instance Supabase containers which publish
    # their ports on the host (Kong 30000, Studio 30001, etc.). The
    # generated caddy-config.ts proxies to `host.docker.internal:<port>`;
    # on Linux that name isn't auto-populated, so we map it to the host
    # gateway explicitly. Without this every per-instance request 502s
    # with "dial tcp: lookup host.docker.internal: no such host".
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    # admin :2019 is intentionally NOT published; only reachable from `internal` network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:2019/config/']
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    image: kmhariharasudhan/supastack-api:${SUPASTACK_VERSION:-latest}
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPASTACK_SERVICE: api
      DATABASE_URL: postgres://supastack:${CONTROL_DB_PASSWORD}@db:5432/supastack
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET required}
      CADDY_ADMIN_URL: http://caddy:2019
      INSTANCES_DIR: /var/supastack/instances
      BACKUPS_DIR: /var/supastack/backups
      SUPASTACK_PUBLIC_IP: ${SUPASTACK_PUBLIC_IP:-}
      SUPASTACK_CERTS_DIR: /var/supastack/certs
      ACME_DIRECTORY_URL: ${ACME_DIRECTORY_URL:-}
      # COOKIE_SECURE=0 (default) lets the session cookie work over plain HTTP
      # — required for /setup + /login before an apex + HTTPS cert exist.
      # Flip to 1 once HTTPS is in place.
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      # Supavisor admin client (feature 005 Phase 5) — pooler-client mints
      # short-TTL HS256 JWTs with this secret to call supavisor's /api/tenants.
      SUPAVISOR_URL: http://supavisor:4000
      SUPAVISOR_API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:-}
      # Feature 014 — OAuth issuer + JWT iss/aud derivation. Same value mcp + supavisor use.
      SUPASTACK_APEX: ${SUPASTACK_APEX:?SUPASTACK_APEX required}
      # Feature 084 US6 — the api checks this to gate email-dependent actions
      # (e.g. invitations 409 when unset). Mirrors the auth service's SMTP config.
      GOTRUE_SMTP_HOST: ${GOTRUE_SMTP_HOST:-}
    ports:
      - 3001:3001
      # pg-edge proxy — direct Postgres endpoint for db.<ref>.<apex>:5432
      # (feature 005). Runs inside the api Node.js process.
      - '5432:5432'
    volumes:
      - /var/supastack/instances:/var/supastack/instances
      - /var/supastack/backups:/var/supastack/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - certs-data:/var/supastack/certs
      # Docker CLI + compose plugin — needed by ssl-enforcement-store and any
      # service that shells out to `docker compose exec` (composeExec helper).
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    networks: [internal]
    # pg-edge proxy (feature 005) connects to per-instance Postgres via
    # host.docker.internal:<port_db_direct>. Same mapping as caddy uses
    # for per-instance Kong/Studio.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:3001/api/v1/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    image: kmhariharasudhan/supastack-worker:${SUPASTACK_VERSION:-latest}
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPASTACK_SERVICE: worker
      DATABASE_URL: postgres://supastack:${CONTROL_DB_PASSWORD}@db:5432/supastack
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      # Feature 117 — single-source apex: the worker reads SUPASTACK_APEX (via
      # getApex) in provision + pooler-reconciler now that installation.apex_domain
      # is dropped. Recreate (not restart) the worker to pick this up.
      SUPASTACK_APEX: ${SUPASTACK_APEX:?SUPASTACK_APEX required}
      CADDY_ADMIN_URL: http://caddy:2019
      INSTANCES_DIR: /var/supastack/instances
      BACKUPS_DIR: /var/supastack/backups
      # Per-instance Studio = the STOCK upstream image (IS_PLATFORM=false is
      # domain-agnostic by design). NOT the old locally-built supastack/studio —
      # that build is gone; a non-hub default here breaks provisioning on
      # pull-mode installs. Keep in sync with provision.ts's default.
      STUDIO_IMAGE: ${STUDIO_IMAGE:-supabase/studio:2026.04.27-sha-5f60601}
      # Feature 008 — worker pooler-reconciler needs to call supavisor admin API.
      SUPAVISOR_URL: http://supavisor:4000
      SUPAVISOR_API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:-}
      # Feature 116 — admin ops console observer sampler cadence + retention.
      OBSERVER_INTERVAL_MS: ${OBSERVER_INTERVAL_MS:-60000}
      OBSERVER_RETENTION_DAYS: ${OBSERVER_RETENTION_DAYS:-7}
    volumes:
      - /var/supastack/instances:/var/supastack/instances
      - /var/supastack/backups:/var/supastack/backups
      - /var/run/docker.sock:/var/run/docker.sock
      # supabase-template is baked into the image (apps/worker/Dockerfile) — no
      # bind-mount, so the pulled image works without the source repo on disk.
    networks: [internal]
    # Feature 008 — pg-password probe (provision worker + pooler-reconciler)
    # needs to reach per-instance Postgres via host.docker.internal:<port_db_direct>.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # MCP HTTP service — wraps upstream @supabase/mcp-server-supabase as a
  # Streamable HTTP transport at mcp.<apex>/mcp, gated by supastack OAuth
  # bearer tokens (feature 014).
  mcp:
    image: kmhariharasudhan/supastack-mcp:${SUPASTACK_VERSION:-latest}
    build:
      context: ..
      dockerfile: apps/mcp/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SUPASTACK_SERVICE: mcp
      DATABASE_URL: postgres://supastack:${CONTROL_DB_PASSWORD}@db:5432/supastack
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY:?MASTER_KEY required}
      SUPASTACK_API_URL: http://api:3001
      SUPASTACK_APEX: ${SUPASTACK_APEX:?SUPASTACK_APEX required}
    networks: [internal]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:3002/health").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))',
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  # Top-level Supavisor — multi-tenant Postgres pooler (feature 005 Phase 5).
  # Provides pooler.<apex>:6543 (transaction mode). Each project is registered
  # as a tenant; clients connect with username postgres.<ref> per Supabase Cloud
  # convention. Tenants are managed by the supastack api via supavisor's HTTP
  # admin API. See specs/005-postgres-public-endpoint/.
  supavisor:
    image: supabase/supavisor:2.7.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '6543:6543'
    volumes:
      - certs-data:/var/supastack/certs:ro
    environment:
      PORT: 4000
      DATABASE_URL: ecto://supastack:${CONTROL_DB_PASSWORD}@db:5432/supastack
      CLUSTER_POSTGRES: 'true'
      SECRET_KEY_BASE: ${SUPAVISOR_SECRET_KEY_BASE:?SUPAVISOR_SECRET_KEY_BASE required}
      VAULT_ENC_KEY: ${SUPAVISOR_VAULT_ENC_KEY:?SUPAVISOR_VAULT_ENC_KEY required}
      API_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET:?SUPAVISOR_API_JWT_SECRET required}
      METRICS_JWT_SECRET: ${SUPAVISOR_API_JWT_SECRET}
      REGION: local
      ERL_AFLAGS: -proto_dist inet_tcp
      GLOBAL_DOWNSTREAM_CERT_PATH: /var/supastack/certs/${SUPASTACK_APEX:?SUPASTACK_APEX required}/cert.pem
      GLOBAL_DOWNSTREAM_KEY_PATH: /var/supastack/certs/${SUPASTACK_APEX}/key.pem
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks: [internal]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:4000/api/health']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    image: kmhariharasudhan/supastack-web:${SUPASTACK_VERSION:-latest}
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks: [internal]
    # web is fronted by Caddy; no public port published.

  studio:
    # Shared Supabase Studio — IS_PLATFORM=true, serves all projects at https://<apex>/.
    # Phase 2: prebuilt domain-agnostic image (infra/studio-platform/Dockerfile, built
    # from github.com/kmhari/supabase#supastack-studio). NEXT_PUBLIC_* are baked at
    # `next build` with a PLACEHOLDER apex; the image entrypoint sed-substitutes the
    # placeholder with SUPASTACK_APEX at first boot, then runs the standalone server.
    # Changing the apex therefore needs a RECREATE (up -d --force-recreate studio),
    # not a restart — the entrypoint refuses a mismatched restart by design.
    # Replaces the Phase-1 checkout + in-container build (node:22-alpine +
    # /opt/supabase-vanilla + 18g build caps) — rollback = git revert this block.
    image: kmhariharasudhan/supastack-studio-platform:${STUDIO_PLATFORM_VERSION:-latest}
    environment:
      SUPASTACK_APEX: ${SUPASTACK_APEX:?SUPASTACK_APEX required}
    networks: [internal]
    restart: unless-stopped
    # Healthcheck is baked in the image: /dashboard/api/get-utc-time (upstream's
    # /api/platform/profile 404s "not supported on hosted" in IS_PLATFORM builds).
    # Fronted by Caddy catch-all /* — no public port published.
